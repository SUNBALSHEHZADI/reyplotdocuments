

# site_name: ReyPlot Documentation 
site_name: ReyPlot Documentation
site_url: https://muhammadessa2002.github.io/reyplot/
site_author: Muhammad Essa
site_description: Lightweight 2D scientific plotting library for Python

# Theme settings
theme:
  name: material
  font:
    text: Roboto
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.ico
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: blue
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: cyan
      accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - navigation.footer
    - content.action.edit
    - content.code.copy
  language: en

# Repository settings
repo_name: MuhammadEssa2002/reyplot
repo_url: https://github.com/MuhammadEssa2002/reyplot

# Navigation structure – matches your file list
nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick_start.md
  - User Guide:
    - Introduction: introduction.md
    - Scatter Plot: scatter.md
    - Axes: axes.md
    - Layers: layers.md
    - Titles: titles.md
    - Legend: legend.md
    - Block Grid: block_grid.md
    - Background Image: background_image.md
    - Colors: colors.md
    - Saving Plots: saving.md
    - Limits: limits.md
  - API Reference: api_reference.md

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/m-essa/
      name: linkedin
    - icon: fontawesome/brands/github
      link: https://github.com/MuhammadEssa2002
      name: GitHub
  